name: ReactDashboard CI

on:
  push:
  pull_request:

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache npm cache directory
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('ReactDashboard/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-

      - name: Bootstrap environment
        run: bash codex/setup.sh

      - name: Run CI test suite
        run: bash scripts/ci-test.sh
